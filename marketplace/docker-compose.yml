version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./src/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/marketplace
      FLYWAY_USER: user
      FLYWAY_PASSWORD: password
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/marketplace
      JWT_SECRET_KEY: supersecretkeychangeinproduction
    volumes:
      - ./src:/app/src
    depends_on:
      flyway:
        condition: service_completed_successfully

volumes:
  pgdata:
