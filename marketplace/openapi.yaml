openapi: 3.0.3
info:
  title: Marketplace API(HW2)
  version: 1.1.2
  description: Marketplace CRUD + Orders Logic by Alex Pokrovskiy

servers:
  - url: http://localhost:8000/api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error_code: { type: string }
        message: { type: string }
        details: { type: object, nullable: true }

    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE, ARCHIVED]
    
    ProductCreate:
      type: object
      required: [name, price, stock, category, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000, nullable: true }
        price: { type: number, format: decimal, minimum: 0.01 }
        stock: { type: integer, minimum: 0 }
        category: { type: string, minLength: 1, maxLength: 100 }
        status: { $ref: '#/components/schemas/ProductStatus' }

    ProductUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 4000, nullable: true }
        price: { type: number, format: decimal, minimum: 0.01 }
        stock: { type: integer, minimum: 0 }
        category: { type: string, minLength: 1, maxLength: 100 }
        status: { $ref: '#/components/schemas/ProductStatus' }

    ProductResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: decimal }
        stock: { type: integer }
        category: { type: string }
        status: { $ref: '#/components/schemas/ProductStatus' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        seller_id: { type: string, format: uuid }

    ProductList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ProductResponse' } }
        totalElements: { type: integer }
        page: { type: integer }
        size: { type: integer }

    OrderStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, SHIPPED, COMPLETED, CANCELED]

    OrderItemInput:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1, maximum: 999 }

    OrderCreate:
      type: object
      required: [items]
      properties:
        items: { type: array, minItems: 1, maxItems: 50, items: { $ref: '#/components/schemas/OrderItemInput' } }
        promo_code: { type: string, pattern: '^[A-Z0-9_]{4,20}$', nullable: true }

    OrderResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/OrderStatus' }
        total_amount: { type: number, format: decimal }
        discount_amount: { type: number, format: decimal }
        created_at: { type: string, format: date-time }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItemResponse' } }

    OrderItemResponse:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        quantity: { type: integer }
        price_at_order: { type: number, format: decimal }

    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [USER, SELLER, ADMIN] }
    
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, default: bearer }

paths:
  /products:
    get:
      summary: List products
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ProductStatus' } }
        - { name: category, in: query, schema: { type: string } }
      responses:
        200: { content: { application/json: { schema: { $ref: '#/components/schemas/ProductList' } } } }
        401: { description: Unauthorized }
        403: { description: Forbidden }
    post:
      summary: Create product
      security: [{ bearerAuth: [] }]
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/ProductCreate' } } }
      responses:
        201: { content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }
        400: { description: Validation Error }
        403: { description: Forbidden (User cannot create) }

  /products/{id}:
    get:
      summary: Get product
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        200: { content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }
        404: { description: Product Not Found }
    put:
      summary: Update product
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/ProductUpdate' } } }
      responses:
        200: { content: { application/json: { schema: { $ref: '#/components/schemas/ProductResponse' } } } }
        403: { description: Forbidden }
        404: { description: Not Found }
    delete:
      summary: Soft delete product
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        204: { description: Deleted }
        403: { description: Forbidden }
        404: { description: Not Found }

  /orders:
    post:
      summary: Create order
      security: [{ bearerAuth: [] }]
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/OrderCreate' } } }
      responses:
        201: { content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } }
        400: { description: Validation }
        409: { description: Business Logic Error (Stock, Active Order, etc) }
        429: { description: Rate Limit }
    
  /orders/{id}:
    get:
      summary: Get order
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        200: { content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } }
        403: { description: Ownership Violation }
        404: { description: Not Found }
    put:
      summary: Update order
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/OrderCreate' } } }
      responses:
        200: { content: { application/json: { schema: { $ref: '#/components/schemas/OrderResponse' } } } }
        409: { description: Invalid State Transition }
  
  /orders/{id}/cancel:
    post:
      summary: Cancel order
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        200: { description: Canceled }
        409: { description: Invalid State Transition }

  /auth/register:
    post:
      summary: Register user
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/RegisterRequest' } } }
      responses:
        201: { description: Created }
  
  /auth/login:
    post:
      summary: Login
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } }
      responses:

        200: { content: { application/json: { schema: { $ref: '#/components/schemas/TokenResponse' } } } }
